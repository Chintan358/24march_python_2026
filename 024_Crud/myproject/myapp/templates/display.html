<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student List</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f4f7fb;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, .15);
        }

        .card-header {
            background: #0d6efd;
            color: white;
            font-size: 24px;
            font-weight: bold;
            padding: 15px;
            border-radius: 15px 15px 0 0 !important;
        }

        table th {
            background: #0d6efd !important;
            color: white;
            text-align: center;
        }

        table td {
            vertical-align: middle;
            text-align: center;
        }

        .badge-lang {
            margin: 2px;
            font-size: 13px;
        }
    </style>
</head>

<body>

    <div class="container mt-5">

        <div class="card">

            <div class="card-header d-flex justify-content-between align-items-center">
                <span>Student List</span>

                <button class="btn btn-light">
                    <a href="{%url 'index'%}">Add Student</a>
                </button>
            </div>

            <div class="card-body">

                <table class="table table-bordered table-hover align-middle">

                    <thead>
                        <tr>
                            <th>Sr. No.</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Gender</th>
                            <th>Languages</th>
                            <th>Country</th>
                            <th>Address</th>
                            <th width="150">Action</th>
                        </tr>
                    </thead>

                    <tbody>

                        {%for i in students%}
                        <tr>
                            <td>{{forloop.counter}}</td>
                            <td>{{i.name}}</td>
                            <td>{{i.email}}</td>
                            <td>{{i.gender}}</td>
                            <td>
                                {%for k in i.lang%}
                                <span class="badge bg-primary badge-lang">{{k }}</span>
                                {%endfor%}
                            </td>
                            <td>{{i.country}}</td>
                            <td>{{i.address}}</td>
                            <td>
                                <button class="btn btn-warning btn-sm">
                                    <a class="bi bi-pencil-square" href=" {%url 'edit' %}?id={{i.id}}">Edit</a>
                                </button>

                                <button class="btn btn-danger btn-sm">
                                    <a class="bi bi-trash" href="{%url 'delete'%}?id={{i.id}}"> Delete</a>
                                </button>
                            </td>
                        </tr>
                        {%endfor%}





                    </tbody>

                </table>

            </div>

        </div>

    </div>

</body>

</html>
