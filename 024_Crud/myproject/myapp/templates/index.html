<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f7fb;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, .15);
        }

        .card-header {
            background: #0d6efd;
            color: white;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            border-radius: 15px 15px 0 0 !important;
        }

        label {
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">

                <div class="card">
                    <div class="card-header">
                        Student Registration Form
                    </div>

                    <div class="card-body">
                        <span class="text-success">{{message}}</span>
                        <form method="post" action="">

                            {%csrf_token%}
                          
                            <!-- Name -->
                            <div class="mb-3">
                                <label class="form-label">Name</label>
                                <input type="text" class="form-control" name="name" placeholder="Enter Full Name"
                                    value="{{student.name}}">
                            </div>

                            <!-- Email -->
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" name="email" placeholder="Enter Email"
                                    value="{{student.email}}">
                            </div>

                            <!-- Password -->
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" name="password" placeholder="Enter Password"
                                    value="{{student.password}}">
                            </div>

                            <!-- Gender -->
                            <div class="mb-3">
                                <label class="form-label d-block">Gender</label>

                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" value="Male" {%if student.gender == 'Male' %}checked{%endif%}>
                                    <label class="form-check-label">Male</label>
                                </div>

                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" value="Female" {%if student.gender == 'Female'%}checked{%endif%}>
                                    <label class="form-check-label">Female</label>
                                </div>

                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" value="Other" {%if student.gender == 'Other' %}checked{%endif%}>
                                    <label class="form-check-label">Other</label>
                                </div>
                            </div>

                            <!-- Languages -->
                            <div class="mb-3">
                                <label class="form-label d-block">Languages Known</label>

                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="lang" value="Gujarati"
                                        {%if 'Gujarati' in student.lang %}checked{%endif%}>
                                    <label class="form-check-label">Gujarati</label>
                                </div>

                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="lang" value="Hindi"
                                        {%if 'Hindi' in student.lang %}checked{%endif%}>
                                    <label class="form-check-label">Hindi</label>
                                </div>

                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="lang" value="English"
                                        {%if 'English' in student.lang %}checked{%endif%}>
                                    <label class="form-check-label">English</label>
                                </div>
                            </div>

                            <!-- Country -->
                            <div class="mb-3">
                                <label class="form-label">Country</label>

                                <select class="form-select" name="country">
                                    <option selected disabled>Select Country</option>
                                    <option {%if student.country == 'India' %}selected{%endif%}>India</option>
                                    <option {%if student.country == 'USA' %}selected{%endif%}>USA</option>
                                    <option {%if student.country == 'Canada' %}selected{%endif%}>Canada</option>
                                    <option {%if student.country == 'Australia' %}selected{%endif%}>Australia</option>
                                    <option {%if student.country == 'United Kingdom' %}selected{%endif%}>United Kingdom
                                    </option>
                                </select>
                            </div>

                            <!-- Address -->
                            <div class="mb-3">
                                <label class="form-label">Address</label>
                                <textarea class="form-control" name="address" rows="4" placeholder="Enter Address"
                                   >{{student.address}}</textarea>
                            </div>

                            <!-- Buttons -->
                            <div class="text-center">
                                <button type="submit" class="btn btn-primary px-4">
                                    Register
                                </button>

                                <button type="reset" class="btn btn-secondary px-4">
                                    Reset
                                </button>
                                <a href="{%url 'display'%}" class="btn btn-warning">Display</a>
                            </div>

                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>

</body>

</html>
