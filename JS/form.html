<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration Form</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


    <script>

        const validation = () => {

            var name = document.getElementById("name").value
            var email = document.getElementById("email").value
            var phone = document.getElementById("phone").value
            var age = document.getElementById("age").value
            var pass = document.getElementById("pass").value
            var cpass = document.getElementById("cpass").value


            var nameErr = document.getElementById("nameErr")
            var emailErr = document.getElementById("emailErr")
            var phoneErr = document.getElementById("phoneErr")
            var ageErr = document.getElementById("ageErr")
            var passErr = document.getElementById("passErr")
            var cpassErr = document.getElementById("cpassErr")

            var btn = document.getElementById("btn")

            var nameExp = /^[a-zA-Z]+$/
            var phoneExp = /^[0-9]{10}$/

            if (name == "" || name == null) {
                nameErr.innerHTML = "Name is required !!!"
                btn.disabled = true
            }
            else if (!nameExp.test(name)) {
                nameErr.innerHTML = "Invalid formate"
            }
            else {
                nameErr.innerHTML = ""
                btn.disabled = false
            }


            if (email == "" || email == null) {
                emailErr.innerHTML = "Email is required !!!"
                btn.disabled = true
            }
            else {
                emailErr.innerHTML = ""
                btn.disabled = false
            }


            if (phone == "" || phone == null) {
                phoneErr.innerHTML = "Phone is required !!!"
                btn.disabled = true
            }
            else if (!phoneExp.test(phone)) {
                phoneErr.innerHTML = "Invalid formate or length"
            }
            else {
                phoneErr.innerHTML = ""
                btn.disabled = false
            }


            if (age == "" || age == null) {
                ageErr.innerHTML = "Age is required !!!"
                btn.disabled = true
            }
            else {
                ageErr.innerHTML = ""
                btn.disabled = false
            }

            if (pass == "" || pass == null) {
                passErr.innerHTML = "Password is required !!!"
                btn.disabled = true
            }
            else {
                passErr.innerHTML = ""
                btn.disabled = false
            }

            if (cpass == "" || cpass == null) {
                cpassErr.innerHTML = "Confirm Password is required !!!"
                btn.disabled = true
            }
            else if (cpass != pass) {
                cpassErr.innerHTML = "Confirm password must be same as password"
                btn.disabled = true
            }
            else {
                cpassErr.innerHTML = ""
                btn.disabled = false
            }



        }


    </script>



</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">

                <div class="card shadow">
                    <div class="card-header text-center">
                        <h3>User Registration</h3>
                    </div>

                    <div class="card-body">
                        <form>

                            <div class="mb-3">
                                <label class="form-label">Name</label>
                                <input type="text" class="form-control" placeholder="Enter your name" id="name"
                                    onkeyup="validation()">
                                <span id="nameErr" class="text-danger"></span>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" placeholder="Enter your email" id="email"
                                    onkeyup="validation()">
                                <span id="emailErr" class="text-danger"></span>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Phone</label>
                                <input type="tel" class="form-control" placeholder="Enter your phone number" id="phone"
                                    onkeyup="validation()">
                                <span id="phoneErr" class="text-danger"></span>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Age</label>
                                <input type="number" class="form-control" placeholder="Enter your age" id="age"
                                    onkeyup="validation()">
                                <span id="ageErr" class="text-danger"></span>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" placeholder="Enter password" id="pass"
                                    onkeyup="validation()">
                                <span id="passErr" class="text-danger"></span>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Confirm Password</label>
                                <input type="password" class="form-control" placeholder="Confirm password" id="cpass"
                                    onkeyup="validation()">
                                <span id="cpassErr" class="text-danger"></span>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary" id='btn'>
                                    Register
                                </button>
                            </div>

                        </form>
                    </div>

                </div>

            </div>
        </div>
    </div>

</body>

</html>
